name: Build Unsigned IPA

on:
  workflow_dispatch: # 允许手动触发
  push:
    branches:
      - main # 或者你的主分支

jobs:
  build-ios:
    name: Build MusicFree IPA
    runs-on: macos-latest # iOS 构建必须在 macOS 环境

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # 根据 package.json 的 engines.node
          cache: 'npm'

      - name: Install JavaScript dependencies
        run: npm ci # 使用 ci 而不是 install 以确保使用 package-lock.json

      - name: Setup Ruby and Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '>=3.0.1' # 根据 Gemfile
          bundler-cache: true # 会自动运行 bundle install 并缓存 gems

      - name: Install Cocoapods
        working-directory: ./ios
        run: pod install --repo-update

      - name: Create ExportOptions.plist for Ad-Hoc export without signing
        run: |
          cat > ExportOptions.plist <<EOL
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict/>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <false/>
          </dict>
          </plist>
          EOL
        working-directory: ./ios

      - name: Build and Archive iOS App
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }} # 即使不签名，有时Xcode仍会尝试访问钥匙串
        run: |
          xcodebuild archive \
            -workspace ios/MusicFree.xcworkspace \
            -scheme MusicFreeNew \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/MusicFree.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            EXPANDED_CODE_SIGN_IDENTITY=""

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/MusicFree.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicFree-IPA
          path: build/ipa/*.ipa # 通常IPA文件名会是你的 Target 名称，这里用通配符
          if-no-files-found: error # 如果没有找到IPA文件则报错
